name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pr-title-check:
    name: PR Title Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;

            let label = '';
            if (changes < 100) label = 'size/XS';
            else if (changes < 300) label = 'size/S';
            else if (changes < 600) label = 'size/M';
            else if (changes < 1000) label = 'size/L';
            else label = 'size/XL';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Unable to add PR size label "${label}" because this workflow token does not have label write permission.`);
              } else {
                throw error;
              }
            }

            if (changes > 1000) {
              core.warning('This PR is very large. Consider breaking it into smaller PRs.');
            }

  conflict-check:
    name: Conflict Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { data: mergeable } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            if (mergeable === false) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['merge-conflict']
                });
              } catch (error) {
                core.warning(`Unable to add merge-conflict label: ${error.message}`);
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'merge-conflict'
                });
              } catch (error) {
                // Label might not exist, ignore
              }
            }
